name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.tag.outputs.version }}',
              name: 'Tendencys Desktop ${{ steps.tag.outputs.version }}',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    # Evaluated once per job; the `secrets` context is not allowed directly in
    # step `if:` conditions, so derive a plain boolean env from it here.
    env:
      # Opt-in: endpoint alone is not enough — broken AZURE_* creds fail the
      # whole Windows job and block publish. Set AZURE_SIGNING_ENABLED=true
      # only after Trusted Signing credentials are verified.
      WINDOWS_SIGNING_ENABLED: ${{ secrets.AZURE_SIGNING_ENABLED == 'true' && secrets.AZURE_SIGNING_ENDPOINT != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Install frontend dependencies
        run: npm ci

      # Production build config. Unset secrets fall back to the in-code defaults
      # (empty string is falsy, so `import.meta.env.X || default` keeps the default),
      # except the two shell-level vars which otherwise default to SANDBOX.
      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'ENVEOF'
          VITE_TENDENCYS_BASE_URL=${{ secrets.VITE_TENDENCYS_BASE_URL }}
          VITE_SHELL_SITE_ID=${{ secrets.VITE_SHELL_SITE_ID }}
          VITE_ENVIA_SHIPPING_URL=${{ secrets.VITE_ENVIA_SHIPPING_URL }}
          VITE_ENVIA_SHIPPING_SITE_ID=${{ secrets.VITE_ENVIA_SHIPPING_SITE_ID }}
          VITE_ENVIA_CARGO_URL=${{ secrets.VITE_ENVIA_CARGO_URL }}
          VITE_ENVIA_CARGO_SITE_ID=${{ secrets.VITE_ENVIA_CARGO_SITE_ID }}
          VITE_ENVIA_FULFILLMENT_URL=${{ secrets.VITE_ENVIA_FULFILLMENT_URL }}
          VITE_ENVIA_FULFILLMENT_SITE_ID=${{ secrets.VITE_ENVIA_FULFILLMENT_SITE_ID }}
          VITE_ENVIA_RETURNS_URL=${{ secrets.VITE_ENVIA_RETURNS_URL }}
          VITE_ENVIA_RETURNS_SITE_ID=${{ secrets.VITE_ENVIA_RETURNS_SITE_ID }}
          VITE_ECART_PAY_URL=${{ secrets.VITE_ECART_PAY_URL }}
          VITE_ECART_PAY_SITE_ID=${{ secrets.VITE_ECART_PAY_SITE_ID }}
          VITE_ECART_BANKING_URL=${{ secrets.VITE_ECART_BANKING_URL }}
          VITE_ECART_BANKING_SITE_ID=${{ secrets.VITE_ECART_BANKING_SITE_ID }}
          VITE_ECART_API_URL=${{ secrets.VITE_ECART_API_URL }}
          VITE_ECART_API_SITE_ID=${{ secrets.VITE_ECART_API_SITE_ID }}
          VITE_TENDENCYS_PARTNERS_URL=${{ secrets.VITE_TENDENCYS_PARTNERS_URL }}
          VITE_TENDENCYS_PARTNERS_SITE_ID=${{ secrets.VITE_TENDENCYS_PARTNERS_SITE_ID }}
          ENVEOF

      # Wire Windows code signing via Azure Trusted Signing. Installs the signer
      # and injects bundle.windows.signCommand so Tauri signs both the inner
      # .exe and the installer in one pass. Skipped automatically if the Trusted
      # Signing config secrets are absent (Windows builds stay unsigned instead
      # of failing the whole release).
      - name: Setup Windows code signing (Azure Trusted Signing)
        if: matrix.platform == 'windows-latest' && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: bash
        env:
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
        run: |
          cargo install trusted-signing-cli
          SIGN_CMD="trusted-signing-cli -e $AZURE_SIGNING_ENDPOINT -a $AZURE_SIGNING_ACCOUNT -c $AZURE_SIGNING_PROFILE -d Tendencys %1"
          jq --arg cmd "$SIGN_CMD" '.bundle.windows += {"signCommand": $cmd}' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json
          mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the Rust binary via option_env!("SENTRY_DSN"). Unset =>
          # Sentry stays disabled (nothing sent) rather than failing the build.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Azure Trusted Signing credentials consumed by trusted-signing-cli
          # (invoked through bundle.windows.signCommand on Windows builds).
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tauriScript: npx tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build]
    # Publish when any platform succeeded. Matrix fail-fast is false; one
    # platform (e.g. Windows signing) must not leave a permanent draft.
    if: ${{ always() && needs.create-release.result == 'success' && needs.build.result != 'cancelled' }}
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
